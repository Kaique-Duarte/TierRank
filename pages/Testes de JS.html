<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TierRank</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../scripts/Tier.js" defer></script>
  </head>
  <body>
    <main>
      <h1 id="titulo">Ainda Não Aconteceu Nada</h1>

      <div id="tb" draggable="true" class="dropitem">
        <img src="../images/TierRank1/logo bmw.png" alt="" />
      </div>

      <div id="tb2" draggable="true" class="dropitem">
        <img src="../images/TierRank1/logo fiat.jpeg" alt="" />
      </div>
      <p></p>
      <div class="dropzone" id="tmTarget"><p class="tierRank">S+</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">S-</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">S</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">A+</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">A</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">A-</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">B+</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">B</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">B-</p></div>
      <div class="dropzone" id="tmTarget"><p class="tierRank">F</p></div>
    </main>
  </body>
</html>
