<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TierRank</title>
    <script src="../scripts/routes.js" defer></script>
  </head>
  <body>
    <style>
      .dropzone{ 
        border: 1px solid black;
        display: flex;
        height: 3rem;
      }
      .itens{
        border: 1px solid black;
        display: flex;
        height: 7rem;
      }
    </style>
    <header>
      <h1 class="Titulo">TierRank</h1>
    </header>
    <main>
      <section class="controls">
        <input type="file" id="file-input" />
        <button id="export-btn">Exportar</button>
        <button id="new-btn">Novo</button>
      </section>
      <section class="tierlist">
        <div class="dropzone"><span>S</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>A</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>B</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>C</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>D</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>E</span><div><button>⬆️</button><button>⬇️</button></div></div>
        <div class="dropzone"><span>F</span><div><button>⬆️</button><button>⬇️</button></div></div>
      </section>
      <input type="file">
      <div class="itens">itens</div>
    </main>
  </body>
</html>
