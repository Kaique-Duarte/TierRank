<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TierRank</title>
    <link
      rel="shortcut icon"
      href="images/favcon/android-chrome-512x512.png"
      type="image/x-icon"
    />
    <script src="scripts/tier.js" defer></script>
    <script src="scripts/ranks.js" defer></script>
    <script src="scripts/removerank.js" defer></script>
  </head>
  <body>
    <style>
      .tierName {
        display: flex;
        justify-content: center;
        align-items: center;
        border: 1px solid black;
        min-height: 4rem;
        max-width: 4rem;
        min-width: 4rem;
        word-break: break-word;
        overflow-wrap: break-word;
      }

      .dropzone {
        display: flex;
        border: 1px solid black;
        min-height: 3rem;
      }
      .dropzone--itens {
        min-height: 10rem;
      }
      .itens {
        border: 1px solid black;
        display: flex;
        height: 7rem;
      }
      img {
        width: 4rem;
        min-width: 7rem;
      }
    </style>
    <header>
      <h1 class="Titulo">TierRank</h1>
    </header>
    <main>
      <section class="controls">
        <input type="file" id="file-input" />
        <button id="export-btn">Exportar</button>
        <button id="new-btn">Novo</button>
      </section>
      <section class="tierlist">
        <div class="dropzone">
          <span contenteditable="true" class="tierName">S</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">A</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">B</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">C</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">D</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">E</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
        <div class="dropzone">
          <span contenteditable="true" class="tierName">F</span>
          <div><button>⬆️</button><button>⬇️</button><button class="removerank">❌</button></div>
        </div>
      </section>
      <button id="addrank">+</button>
      <input type="file" />
      <div class="dropzone dropzone--itens">
        <span> itens </span>
      </div>
    </main>
  </body>
</html>
